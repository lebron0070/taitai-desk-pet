name: Build beta release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build Windows x64 packages
        run: pnpm run build:win

      - name: Attach Windows packages to release
        uses: softprops/action-gh-release@v2
        with:
          name: 今天也没离职 v0.4.0 Beta
          body_path: release/GitHub-Release-v0.4.0.md
          prerelease: true
          files: |
            release/Taitai-*-win-x64.exe
            release/Taitai-*-win-x64.zip
