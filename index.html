<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e8e0cf" />
  <title>今天也没离职 · 上班搭子</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@500;700;900&display=swap');

    :root {
      --ink: #252b25;
      --paper: #f5f0e5;
      --paper-deep: #e9e1d1;
      --green: #788b72;
      --green-deep: #435844;
      --orange: #dd765a;
      --yellow: #e9c46a;
      --line: rgba(37, 43, 37, .16);
      --shadow: 0 22px 60px rgba(56, 49, 37, .16);
    }

    * { box-sizing: border-box; }
    html { min-height: 100%; }
    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: "Noto Serif SC", serif;
      background:
        linear-gradient(rgba(59, 65, 54, .045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59, 65, 54, .045) 1px, transparent 1px),
        #e7dfcf;
      background-size: 28px 28px;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .16;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.18'/%3E%3C/svg%3E");
      mix-blend-mode: multiply;
      z-index: 20;
    }

    button, input { font: inherit; }
    button { color: inherit; }

    .shell {
      width: min(1120px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 26px 0 38px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 20px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-mark {
      width: 42px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border: 1.5px solid var(--ink);
      border-radius: 50% 48% 46% 53%;
      background: var(--orange);
      font: 900 22px/1 "Noto Serif SC", serif;
      transform: rotate(-7deg);
      box-shadow: 3px 3px 0 var(--ink);
    }
    .brand-title { font-weight: 900; letter-spacing: .08em; }
    .brand-sub { margin-top: 2px; color: #657065; font: 11px/1.3 "DM Mono", monospace; letter-spacing: .08em; }

    .boss-key {
      border: 1px solid var(--ink);
      border-radius: 999px;
      padding: 9px 14px;
      background: transparent;
      box-shadow: 2px 2px 0 var(--ink);
      cursor: pointer;
      font-size: 12px;
      transition: .2s ease;
    }
    .boss-key:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--ink); }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(300px, .65fr);
      gap: 20px;
      align-items: stretch;
    }

    .card {
      border: 1.5px solid var(--ink);
      border-radius: 28px;
      background: var(--paper);
      box-shadow: var(--shadow), 5px 5px 0 var(--ink);
      overflow: hidden;
      position: relative;
    }

    .habitat {
      min-height: 610px;
      padding: 26px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background:
        radial-gradient(circle at 83% 13%, rgba(233, 196, 106, .4), transparent 23%),
        linear-gradient(150deg, #f8f3e9 0 55%, #e8dfce 55% 100%);
    }

    .tape {
      position: absolute;
      width: 110px;
      height: 28px;
      top: 12px;
      left: 50%;
      background: rgba(222, 197, 145, .6);
      transform: translateX(-50%) rotate(-2deg);
      border-left: 1px dashed rgba(37,43,37,.2);
      border-right: 1px dashed rgba(37,43,37,.2);
      z-index: 2;
    }

    .topline { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .date { font: 12px/1.4 "DM Mono", monospace; color: var(--green-deep); }
    .countdown-label { font-size: 13px; color: #6f776d; text-align: right; }
    .countdown { margin-top: 2px; font: 500 clamp(25px, 4vw, 42px)/1 "DM Mono", monospace; letter-spacing: -.08em; }

    .scene { display: grid; place-items: center; position: relative; padding-top: 26px; }
    .scene::before {
      content: "";
      position: absolute;
      width: min(450px, 86%);
      height: min(330px, 80%);
      border: 1px dashed rgba(67,88,68,.24);
      border-radius: 50%;
      transform: rotate(-4deg);
    }

    .status-note {
      position: absolute;
      top: 14%;
      right: 4%;
      width: 150px;
      padding: 14px 15px;
      background: #f3d981;
      border: 1px solid var(--ink);
      box-shadow: 3px 4px 0 rgba(37,43,37,.75);
      transform: rotate(4deg);
      font-size: 13px;
      line-height: 1.7;
      z-index: 3;
    }
    .status-note::before { content: "当前状态"; display: block; font: 10px/1.3 "DM Mono", monospace; opacity: .6; margin-bottom: 3px; }

    .pet-wrap { position: relative; width: 260px; height: 280px; z-index: 2; cursor: pointer; }
    .pet-shadow { position: absolute; width: 190px; height: 32px; border-radius: 50%; background: rgba(37,43,37,.16); bottom: 15px; left: 35px; filter: blur(3px); }
    .pet {
      position: absolute;
      width: 205px;
      height: 180px;
      left: 27px;
      bottom: 36px;
      border: 3px solid var(--ink);
      border-radius: 44% 48% 40% 42%;
      background: #aab79c;
      animation: breathe 3.2s ease-in-out infinite;
      transform-origin: bottom;
      box-shadow: inset -17px -15px 0 rgba(67,88,68,.1);
    }
    .pet::before, .pet::after {
      content: "";
      position: absolute;
      width: 48px;
      height: 56px;
      top: -22px;
      border: 3px solid var(--ink);
      border-bottom: 0;
      background: #aab79c;
      z-index: -1;
    }
    .pet::before { left: 20px; border-radius: 70% 35% 0 0; transform: rotate(-14deg); }
    .pet::after { right: 18px; border-radius: 35% 70% 0 0; transform: rotate(14deg); }
    .face { position: absolute; inset: 0; }
    .eye { position: absolute; top: 68px; width: 10px; height: 5px; border: solid var(--ink); border-width: 0 0 2.5px 0; border-radius: 50%; }
    .eye.left { left: 58px; transform: rotate(7deg); }
    .eye.right { right: 58px; transform: rotate(-7deg); }
    .snout { position: absolute; width: 70px; height: 48px; left: 66px; top: 82px; border: 2px solid var(--ink); border-radius: 48%; background: #c8cfbb; }
    .nose { width: 13px; height: 9px; margin: 10px auto 0; border-radius: 50%; background: var(--ink); }
    .mouth { width: 20px; height: 8px; margin: 1px auto 0; border: solid var(--ink); border-width: 0 0 2px 0; border-radius: 50%; }
    .blush { position: absolute; width: 23px; height: 9px; top: 105px; border-radius: 50%; background: rgba(221,118,90,.33); }
    .blush.left { left: 32px; } .blush.right { right: 32px; }
    .paw { position: absolute; bottom: -11px; width: 54px; height: 30px; border: 3px solid var(--ink); border-radius: 50%; background: #9fae91; }
    .paw.left { left: 20px; transform: rotate(-7deg); } .paw.right { right: 20px; transform: rotate(7deg); }
    .coffee { position: absolute; right: -17px; bottom: 34px; font-size: 48px; transform: rotate(8deg); filter: drop-shadow(2px 3px 0 rgba(37,43,37,.25)); }
    .speech {
      position: absolute;
      left: -8px;
      top: 8px;
      padding: 10px 14px;
      border: 1.5px solid var(--ink);
      border-radius: 16px 16px 4px 16px;
      background: white;
      font-size: 12px;
      transform: rotate(-4deg);
      opacity: 0;
      transition: .25s ease;
      pointer-events: none;
    }
    .speech.show { opacity: 1; transform: rotate(-4deg) translateY(-8px); }

    @keyframes breathe { 0%,100% { transform: scaleY(1) rotate(-1deg); } 50% { transform: scaleY(1.025) rotate(1deg); } }
    @keyframes boop { 0% { transform: scaleY(1); } 40% { transform: scale(.94, 1.05) rotate(-3deg); } 100% { transform: scaleY(1); } }
    @keyframes sip { 0%,100% { transform: rotate(8deg); } 50% { transform: translate(-25px,-38px) rotate(-12deg); } }
    .pet.boop { animation: boop .5s ease; }
    .coffee.sip { animation: sip .8s ease; }

    .actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .action {
      border: 1px solid var(--ink);
      border-radius: 15px;
      padding: 13px 10px;
      background: rgba(255,255,255,.45);
      cursor: pointer;
      box-shadow: 2px 2px 0 var(--ink);
      transition: .18s ease;
      font-size: 13px;
    }
    .action:hover { background: white; transform: translateY(-2px); box-shadow: 3px 4px 0 var(--ink); }
    .action:active { transform: translate(2px,2px); box-shadow: none; }

    .side { display: grid; grid-template-rows: auto 1fr auto; gap: 14px; }
    .panel { padding: 22px; border: 1.5px solid var(--ink); border-radius: 23px; background: rgba(245,240,229,.9); box-shadow: 4px 4px 0 var(--ink); }
    .panel-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; font-size: 14px; font-weight: 900; }
    .tag { border: 1px solid var(--ink); border-radius: 999px; padding: 4px 8px; color: var(--green-deep); font: 9px/1 "DM Mono", monospace; background: #d8e0d0; }
    .stat-row { display: flex; align-items: flex-end; justify-content: space-between; padding: 13px 0; border-bottom: 1px dashed var(--line); }
    .stat-row:last-child { border: 0; }
    .stat-label { color: #6b7369; font-size: 12px; }
    .stat-value { font: 500 17px/1 "DM Mono", monospace; }
    .mood-track { width: 100%; height: 12px; border: 1px solid var(--ink); border-radius: 999px; padding: 2px; margin-top: 8px; }
    .mood-fill { width: 68%; height: 100%; border-radius: inherit; background: repeating-linear-gradient(135deg, var(--orange) 0 7px, #e99c72 7px 14px); transition: width .4s ease; }

    .quote-panel { display: flex; flex-direction: column; justify-content: space-between; background: var(--green-deep); color: #f7f1e7; position: relative; overflow: hidden; }
    .quote-panel::after { content: "摸鱼"; position: absolute; right: -13px; bottom: -25px; color: rgba(255,255,255,.06); font: 900 70px/1 "Ma Shan Zheng", cursive; transform: rotate(-8deg); }
    blockquote { margin: 0; font-size: clamp(20px, 2.6vw, 28px); line-height: 1.55; letter-spacing: .04em; position: relative; z-index: 1; }
    .quote-source { margin-top: 20px; opacity: .62; font: 10px/1.5 "DM Mono", monospace; }

    .report-btn { width: 100%; border: 1.5px solid var(--ink); border-radius: 18px; padding: 16px; background: var(--orange); box-shadow: 4px 4px 0 var(--ink); cursor: pointer; font-weight: 900; letter-spacing: .08em; transition: .2s ease; }
    .report-btn:hover { transform: translate(-1px,-2px); box-shadow: 6px 7px 0 var(--ink); }

    footer { display: flex; justify-content: space-between; color: #687064; font: 10px/1.4 "DM Mono", monospace; }

    .modal { position: fixed; inset: 0; z-index: 30; display: none; place-items: center; padding: 20px; background: rgba(31,34,29,.52); backdrop-filter: blur(8px); }
    .modal.open { display: grid; }
    .report-card { width: min(410px, 100%); border: 2px solid var(--ink); border-radius: 26px; padding: 28px; background: var(--paper); box-shadow: 8px 9px 0 var(--ink); position: relative; animation: enter .3s ease both; }
    @keyframes enter { from { opacity: 0; transform: translateY(16px) rotate(1deg); } }
    .report-head { border-bottom: 1px dashed var(--line); padding-bottom: 18px; }
    .report-kicker { color: var(--orange); font: 500 10px/1 "DM Mono", monospace; letter-spacing: .14em; }
    .report-title { margin: 8px 0 0; font-size: 28px; }
    .report-lines { padding: 15px 0; line-height: 2.2; font-size: 14px; }
    .report-badge { padding: 16px; border-radius: 16px; background: var(--green-deep); color: white; text-align: center; }
    .report-badge small { display: block; opacity: .6; margin-bottom: 4px; }
    .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
    .modal-actions button { border: 1px solid var(--ink); border-radius: 12px; padding: 11px; cursor: pointer; background: white; }
    .modal-actions button:first-child { background: var(--yellow); }

    .boss-screen { position: fixed; inset: 0; z-index: 100; display: none; background: #f5f6f7; color: #1d2a36; font-family: Arial, sans-serif; padding: 25px; overflow: auto; }
    .boss-screen.open { display: block; }
    .excel-bar { background: #107c41; color: white; padding: 12px 18px; font-size: 14px; }
    .sheet { background: white; border: 1px solid #b5bdc6; margin-top: 15px; display: grid; grid-template-columns: 55px repeat(6, minmax(100px, 1fr)); font-size: 12px; }
    .cell { min-height: 34px; border-right: 1px solid #d6dadd; border-bottom: 1px solid #d6dadd; padding: 8px; }
    .cell.head { background: #edf0f2; font-weight: bold; text-align: center; }
    .cell.good { color: #0a7436; font-weight: bold; }

    @media (max-width: 760px) {
      .shell { width: min(100% - 20px, 560px); padding-top: 14px; }
      .brand-sub { display: none; }
      main { grid-template-columns: 1fr; }
      .habitat { min-height: 580px; padding: 20px; }
      .status-note { right: 0; width: 130px; }
      .side { grid-template-columns: 1fr; }
      .quote-panel { min-height: 220px; }
      footer span:last-child { display: none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="brand">
        <div class="brand-mark">还</div>
        <div>
          <div class="brand-title">今天也没离职</div>
          <div class="brand-sub">A TINY COMPANION FOR WORKING HOURS</div>
        </div>
      </div>
      <button class="boss-key" id="bossKey">老板来了 · ESC</button>
    </header>

    <main>
      <section class="card habitat">
        <div class="tape"></div>
        <div class="topline">
          <div class="date" id="today">FRI · JUL 17</div>
          <div>
            <div class="countdown-label">距离下班还有</div>
            <div class="countdown" id="countdown">02:18:36</div>
          </div>
        </div>

        <div class="scene">
          <div class="status-note" id="statusNote">正在替你<br>假装思考</div>
          <div class="pet-wrap" id="petWrap" aria-label="点击摸摸上班搭子">
            <div class="speech" id="speech">嗯……再摸一下。</div>
            <div class="pet-shadow"></div>
            <div class="pet" id="pet">
              <div class="face">
                <i class="eye left"></i><i class="eye right"></i>
                <div class="snout"><div class="nose"></div><div class="mouth"></div></div>
                <i class="blush left"></i><i class="blush right"></i>
              </div>
              <i class="paw left"></i><i class="paw right"></i>
              <span class="coffee" id="coffee">☕</span>
            </div>
          </div>
        </div>

        <div class="actions">
          <button class="action" data-action="coffee">☕ 投喂咖啡</button>
          <button class="action" data-action="pet">◌ 摸摸脑袋</button>
          <button class="action" data-action="sigh">… 一起叹气</button>
        </div>
      </section>

      <aside class="side">
        <section class="panel">
          <div class="panel-title">今日工位记录 <span class="tag">LOCAL ONLY</span></div>
          <div class="stat-row"><span class="stat-label">带薪休息</span><strong class="stat-value" id="fishTime">18 min</strong></div>
          <div class="stat-row"><span class="stat-label">电子功德</span><strong class="stat-value" id="merit">+66</strong></div>
          <div class="stat-row"><span class="stat-label">咖啡续命</span><strong class="stat-value" id="coffeeCount">2 杯</strong></div>
          <div class="stat-row" style="display:block"><span class="stat-label">灵魂在线程度</span><div class="mood-track"><div class="mood-fill" id="moodFill"></div></div></div>
        </section>

        <section class="panel quote-panel">
          <div class="panel-title">今日工位签</div>
          <blockquote id="quote">“不要为难自己，<br>活儿是公司的。”</blockquote>
          <div class="quote-source">— 工位生物观察室 · 第 017 号记录</div>
        </section>

        <button class="report-btn" id="reportBtn">生成我的上班日报 ↗</button>
      </aside>
    </main>

    <footer><span>© 2026 工位生物观察室</span><span>没有上传任何摸鱼数据，请放心。</span></footer>
  </div>

  <div class="modal" id="reportModal" role="dialog" aria-modal="true">
    <div class="report-card">
      <div class="report-head"><div class="report-kicker">WORK SURVIVAL REPORT</div><h2 class="report-title">今天也没离职</h2></div>
      <div class="report-lines" id="reportLines"></div>
      <div class="report-badge"><small>今日工位称号</small><strong id="dailyTitle">看起来很忙的淡人</strong></div>
      <div class="modal-actions"><button id="copyReport">复制文案</button><button id="closeModal">先藏起来</button></div>
    </div>
  </div>

  <div class="boss-screen" id="bossScreen">
    <div class="excel-bar">季度经营数据分析.xlsx　　文件　开始　插入　公式　数据　审阅</div>
    <div class="sheet" id="sheet"></div>
  </div>

  <script>
    const state = JSON.parse(localStorage.getItem('deskPetState') || 'null') || { merit: 66, coffees: 2, pets: 0, started: Date.now() };
    const $ = (s) => document.querySelector(s);
    const phrases = {
      coffee: ['续上了，但只续了一点。', '咖啡负责续命，你负责发呆。', '收到，精神假装上线。'],
      pet: ['嗯……再摸一下。', '工作不会消失，先摸我。', '检测到一点点幸福。'],
      sigh: ['唉——这口气很有分量。', '叹完了，继续假装稳定。', '已替你向宇宙提交辞职申请。']
    };
    const notes = ['正在替你<br>假装思考', '正在研究<br>如何准点下班', '人还在<br>魂先走了', '检测到老板<br>开始眨眼', '正在开一个<br>没有结论的会'];
    const titles = ['看起来很忙的淡人', '带薪思考大师', '工位钉子户', '情绪稳定表演艺术家', '会议静音冠军'];

    function save() { localStorage.setItem('deskPetState', JSON.stringify(state)); renderStats(); }
    function renderStats() {
      const mins = Math.max(1, Math.floor((Date.now() - state.started) / 60000) + 18);
      $('#fishTime').textContent = `${mins} min`;
      $('#merit').textContent = `+${state.merit}`;
      $('#coffeeCount').textContent = `${state.coffees} 杯`;
      $('#moodFill').style.width = `${Math.min(94, 48 + state.pets * 4 + state.coffees * 5)}%`;
    }

    function updateClock() {
      const now = new Date();
      $('#today').textContent = new Intl.DateTimeFormat('zh-CN', { weekday:'short', month:'short', day:'numeric' }).format(now).toUpperCase();
      const end = new Date(now); end.setHours(18, 0, 0, 0);
      const diff = Math.max(0, end - now);
      const h = String(Math.floor(diff / 3600000)).padStart(2,'0');
      const m = String(Math.floor(diff % 3600000 / 60000)).padStart(2,'0');
      const s = String(Math.floor(diff % 60000 / 1000)).padStart(2,'0');
      $('#countdown').textContent = diff ? `${h}:${m}:${s}` : '已下班 ✓';
      renderStats();
    }

    function react(type) {
      const words = phrases[type];
      $('#speech').textContent = words[Math.floor(Math.random() * words.length)];
      $('#speech').classList.add('show');
      $('#pet').classList.remove('boop'); void $('#pet').offsetWidth; $('#pet').classList.add('boop');
      if (type === 'coffee') { state.coffees++; state.merit += 5; $('#coffee').classList.remove('sip'); void $('#coffee').offsetWidth; $('#coffee').classList.add('sip'); }
      if (type === 'pet') { state.pets++; state.merit += 3; }
      if (type === 'sigh') state.merit += 8;
      $('#statusNote').innerHTML = notes[Math.floor(Math.random() * notes.length)];
      save();
      clearTimeout(window.speechTimer); window.speechTimer = setTimeout(() => $('#speech').classList.remove('show'), 2400);
    }

    document.querySelectorAll('.action').forEach(btn => btn.addEventListener('click', () => react(btn.dataset.action)));
    $('#petWrap').addEventListener('click', () => react('pet'));

    function toggleBoss(force) { $('#bossScreen').classList.toggle('open', force ?? !$('#bossScreen').classList.contains('open')); }
    $('#bossKey').addEventListener('click', () => toggleBoss());
    document.addEventListener('keydown', e => { if (e.key === 'Escape') toggleBoss(); });

    const sheet = $('#sheet');
    const cells = ['','A','B','C','D','E','F'];
    for(let r=0;r<13;r++) for(let c=0;c<7;c++) {
      const el = document.createElement('div'); el.className = 'cell' + (r===0 || c===0 ? ' head':'');
      el.textContent = r===0 ? cells[c] : c===0 ? r : c===1 ? ['项目','用户增长','转化率','季度目标','执行进度','风险评估','ROI预测','数据复盘','渠道分析','资源分配','结论','下一步'][r-1] : c===2 ? `${Math.floor(60+Math.random()*39)}%` : c===3 ? (Math.random()*200).toFixed(2) : c===4 ? '正常推进' : c===5 ? '待复核' : '—';
      if(c===4 && r>0) el.classList.add('good'); sheet.appendChild(el);
    }

    $('#reportBtn').addEventListener('click', () => {
      renderStats();
      const mins = $('#fishTime').textContent;
      const title = titles[(state.pets + state.coffees) % titles.length];
      $('#dailyTitle').textContent = title;
      $('#reportLines').innerHTML = `今日工位状态：人还在，魂已下班<br>带薪休息：${mins}<br>电子功德：+${state.merit}<br>咖啡续命：${state.coffees} 次<br>替你拒绝无效会议：${Math.max(1, Math.floor(state.merit/33))} 次`;
      $('#reportModal').classList.add('open');
    });
    $('#closeModal').addEventListener('click', () => $('#reportModal').classList.remove('open'));
    $('#reportModal').addEventListener('click', e => { if(e.target === e.currentTarget) e.currentTarget.classList.remove('open'); });
    $('#copyReport').addEventListener('click', async () => {
      const text = `今天也没离职｜上班日报\n${$('#reportLines').innerText}\n今日称号：${$('#dailyTitle').textContent}`;
      await navigator.clipboard.writeText(text); $('#copyReport').textContent = '已复制 ✓'; setTimeout(()=>$('#copyReport').textContent='复制文案', 1600);
    });

    updateClock(); setInterval(updateClock, 1000); save();
  </script>
</body>
</html>
